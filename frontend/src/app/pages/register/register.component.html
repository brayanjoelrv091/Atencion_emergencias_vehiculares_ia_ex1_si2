<div class="wrap">
  <h1>Registro (cliente)</h1>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>Nombre</label>
    <input type="text" formControlName="name" autocomplete="name" />
    <label>Correo</label>
    <input type="email" formControlName="email" autocomplete="email" />
    <label>Contraseña (mín. 8)</label>
    <input type="password" formControlName="password" autocomplete="new-password" />
    @if (error) {
      <p class="err">{{ error }}</p>
    }
    @if (ok) {
      <p class="ok">Cuenta creada. Redirigiendo al login…</p>
    }
    <button type="submit" [disabled]="form.invalid">Registrarme</button>
  </form>
  <p><a routerLink="/login">Ya tengo cuenta</a></p>
</div>
