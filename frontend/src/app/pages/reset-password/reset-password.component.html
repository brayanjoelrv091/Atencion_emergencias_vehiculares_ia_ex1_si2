<div class="wrap">
  <h2>Restablecer Contraseña</h2>
  
  <div *ngIf="success" class="success">
    <p>¡Contraseña actualizada con éxito! Redirigiendo al inicio de sesión...</p>
  </div>

  <form *ngIf="!success" (submit)="onSubmit()">
    <label for="token">Token de Recuperación</label>
    <input
      type="text"
      id="token"
      name="token"
      [(ngModel)]="token"
      required
      [disabled]="loading"
      placeholder="Pega el token recibido"
    />

    <label for="newPassword">Nueva Contraseña</label>
    <input
      type="password"
      id="newPassword"
      name="newPassword"
      [(ngModel)]="newPassword"
      required
      [disabled]="loading"
      placeholder="Mínimo 8 caracteres"
    />

    <label for="confirmPassword">Confirmar Nueva Contraseña</label>
    <input
      type="password"
      id="confirmPassword"
      name="confirmPassword"
      [(ngModel)]="confirmPassword"
      required
      [disabled]="loading"
    />

    <button type="submit" [disabled]="loading || !token || !newPassword">
      {{ loading ? 'Actualizando...' : 'Actualizar Contraseña' }}
    </button>
  </form>

  <div *ngIf="error" class="err">{{ error }}</div>

  <p class="links">
    <a routerLink="/login">Volver al inicio de sesión</a>
  </p>
</div>
