<div class="tech-bg"></div>

<div class="auth-container">
  <div class="glass-card auth-card">
    <h1 class="tech-font cyan-text">NUEVA CONTRASEÑA</h1>
    <p class="subtitle-small">RutaIGeoProxi — Seguridad de Cuenta</p>
    
    @if (success) {
      <div class="success-msg-box">
        <p>¡Contraseña actualizada con éxito!</p>
        <p>Redirigiendo al inicio de sesión...</p>
      </div>
    }

    @if (!success) {
      <form (submit)="onSubmit()" class="tech-form-vertical">
        <div class="form-group">
          <label>Token de Recuperación</label>
          <input type="text" name="token" [(ngModel)]="token" required placeholder="Pega el token generado" />
        </div>

        <div class="form-group">
          <label>Nueva Contraseña</label>
          <input type="password" name="newPassword" [(ngModel)]="newPassword" required placeholder="Mínimo 8 caracteres" />
        </div>

        <div class="form-group">
          <label>Confirmar Contraseña</label>
          <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required placeholder="••••••••" />
        </div>

        @if (error) {
          <p class="error-msg-box">{{ error }}</p>
        }

        <button type="submit" class="btn-premium" [disabled]="loading || !token || !newPassword">
          {{ loading ? 'SINCRONIZANDO...' : 'ACTUALIZAR LLAVE' }}
        </button>
      </form>
    }

    <div class="auth-footer">
      <a routerLink="/login">← Cancelar y volver</a>
    </div>
  </div>
</div>
