<div class="tech-bg"></div>

<div class="auth-container">
  <div class="glass-card auth-card">
    <h1 class="tech-font cyan-text">RECUPERAR ACCESO</h1>
    <p class="subtitle-small">RutaIGeoProxi — Plataforma de Emergencias</p>
    
    <form [formGroup]="form" (ngSubmit)="submit()" class="tech-form-vertical">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" formControlName="email" placeholder="ejemplo@correo.com" autocomplete="email" />
      </div>

      @if (message) {
        <p class="success-msg-box">{{ message }}</p>
      }

      @if (debugToken) {
        <div class="debug-info">
          <p><strong>DEPURACIÓN:</strong> Token generado:</p>
          <code>{{ debugToken }}</code>
          <p><a [routerLink]="['/reset-password']" [queryParams]="{ token: debugToken }">Ir a restablecer →</a></p>
        </div>
      }

      <button type="submit" class="btn-premium" [disabled]="form.invalid">ENVIAR INSTRUCCIONES</button>
    </form>

    <div class="auth-footer">
      <a routerLink="/login">← Volver al inicio de sesión</a>
    </div>
  </div>
</div>
