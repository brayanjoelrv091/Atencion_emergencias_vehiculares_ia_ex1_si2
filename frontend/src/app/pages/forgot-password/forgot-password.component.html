<div class="wrap">
  <h2>Recuperar Contraseña</h2>
  <p>Ingresa tu correo electrónico para recibir instrucciones.</p>

  <form (submit)="onSubmit()">
    <label for="email">Correo Electrónico</label>
    <input
      type="email"
      id="email"
      name="email"
      [(ngModel)]="email"
      required
      [disabled]="loading"
      placeholder="ejemplo@correo.com"
    />

    <button type="submit" [disabled]="loading || !email">
      {{ loading ? 'Enviando...' : 'Enviar Instrucciones' }}
    </button>
  </form>

  <div *ngIf="error" class="err">{{ error }}</div>
  <div *ngIf="message" class="success">{{ message }}</div>

  <div *ngIf="debugToken" class="debug-info">
    <p><strong>DEPURACIÓN:</strong> Token generado (en producción se enviaría por correo):</p>
    <code>{{ debugToken }}</code>
    <p><a [routerLink]="['/reset-password']" [queryParams]="{ token: debugToken }">Ir a restablecer</a></p>
  </div>

  <p class="links">
    <a routerLink="/login">Volver al inicio de sesión</a>
  </p>
</div>
