<div class="tech-bg"></div>

<div class="auth-container">
  <div class="glass-card auth-card">
    <h1 class="tech-font cyan-text">INICIAR SESIÓN</h1>
    <p class="subtitle-small">RutaIGeoProxi — Plataforma de Emergencias</p>
    
    <form [formGroup]="form" (ngSubmit)="submit()" class="tech-form-vertical">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" formControlName="email" autocomplete="email" placeholder="ejemplo@correo.com" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      @if (error) {
        <p class="error-msg-box">{{ error }}</p>
      }

      <button type="submit" class="btn-premium" [disabled]="form.invalid">CONECTAR</button>
    </form>

    <div class="auth-footer">
      <a routerLink="/register">Crear cuenta nueva</a>
      <span class="sep">|</span>
      <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>
