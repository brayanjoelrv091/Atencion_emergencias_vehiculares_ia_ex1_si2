<div class="reports-container">
  <div class="header">
    <h1><i class="fas fa-file-invoice"></i> Panel de Reportes Estadísticos</h1>
    <p>CU19 & CU20 — Gestión de Incidentes Atendidos</p>
  </div>

  <div class="actions">
    <button (click)="descargarPDF()" [disabled]="loading" class="btn btn-pdf">
      <span *ngIf="!loading">Descargar PDF <i class="fas fa-file-pdf"></i></span>
      <span *ngIf="loading">Generando... <i class="fas fa-spinner fa-spin"></i></span>
    </button>

    <button (click)="descargarExcel()" [disabled]="loading" class="btn btn-excel">
      <span *ngIf="!loading">Exportar Excel <i class="fas fa-file-excel"></i></span>
      <span *ngIf="loading">Generando... <i class="fas fa-spinner fa-spin"></i></span>
    </button>
  </div>

  <div class="history-section">
    <h3>Historial de Reportes Generados</h3>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Archivo</th>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let rep of historial">
            <td>#{{rep.id}}</td>
            <td>{{rep.nombre_archivo}}</td>
            <td><span class="badge" [ngClass]="rep.tipo_reporte.toLowerCase()">{{rep.tipo_reporte}}</span></td>
            <td>{{rep.fecha_generacion | date:'dd/MM/yyyy HH:mm'}}</td>
            <td><span class="status-online">Listo</span></td>
          </tr>
          <tr *ngIf="historial.length === 0">
            <td colspan="5" style="text-align: center; padding: 20px;">No hay reportes generados aún.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
