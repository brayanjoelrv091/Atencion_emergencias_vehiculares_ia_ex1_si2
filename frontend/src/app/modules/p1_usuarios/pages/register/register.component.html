<div class="tech-bg"></div>

<div class="auth-container">
  <div class="glass-card auth-card">
    <h1 class="tech-font cyan-text">CREAR CUENTA</h1>
    <p class="subtitle-small">Únete a la Red de Asistencia RutAIGeoProxi</p>
    
    <form [formGroup]="form" (ngSubmit)="submit()" class="tech-form-vertical">
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" formControlName="nombre" placeholder="Juan Pérez" />
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" formControlName="email" autocomplete="email" placeholder="ejemplo@correo.com" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" autocomplete="new-password" placeholder="••••••••" />
      </div>

      <div class="form-group role-selector">
        <label>Tipo de Cuenta</label>
        <div class="role-options">
          <label class="role-option">
            <input type="radio" formControlName="rol" value="cliente">
            <span class="role-label">🚗 Cliente</span>
          </label>
          <label class="role-option">
            <input type="radio" formControlName="rol" value="taller">
            <span class="role-label">🏪 Taller</span>
          </label>
        </div>
      </div>

      @if (error) {
        <p class="error-msg-box">{{ error }}</p>
      }

      <button type="submit" class="btn-premium" [disabled]="form.invalid">REGISTRARSE</button>
    </form>

    <div class="auth-footer">
      <span>¿Ya tienes una cuenta?</span>
      <a routerLink="/login" class="ms-1">Inicia sesión aquí</a>
    </div>
  </div>
</div>
