<div class="tracking-page">
    <div class="tracking-header">
        <div class="info">
            <h2><i class="fas fa-map-marker-alt"></i> Seguimiento en Vivo</h2>
            <p>Servicio: Asistencia Mecánica #{{incidentId}}</p>
        </div>
        <div class="status-badge" [ngClass]="{'status-error': status === 'Error de conexión'}">
            <span class="pulse-icon"></span> {{status}}
        </div>
    </div>

    <div class="map-wrapper">
        <div id="map-container"></div>
        
        <div class="map-overlay">
            <div class="tecnico-card">
                <div class="avatar">
                    <img src="https://ui-avatars.com/api/?name=Tecnico+Juan&background=00f3ff&color=000" alt="Avatar">
                </div>
                <div class="details">
                    <span class="name">Juan Pérez</span>
                    <span class="role">Técnico Especialista</span>
                    <div class="stars">
                      <i class="fas fa-star"></i>
                      <i class="fas fa-star"></i>
                      <i class="fas fa-star"></i>
                      <i class="fas fa-star"></i>
                      <i class="fas fa-star-half-alt"></i>
                    </div>
                </div>
                <button class="btn-msg"><i class="fas fa-comment-dots"></i></button>
            </div>
        </div>
    </div>

    <div class="tracking-footer">
        <div class="eta">
            <i class="fas fa-clock"></i> Tiempo estimado: <span>12 min</span>
        </div>
        <div class="dist">
            <i class="fas fa-road"></i> Distancia: <span>3.4 km</span>
        </div>
    </div>
</div>
